name: Feature request
description: Suggest a feature, improvement, or workflow change.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. The most useful feature requests start
        with the **problem you're trying to solve**, not the solution
        you'd like us to build. That gives us room to find the simplest
        thing that works.

        Before filing: a few things we deliberately don't ship — please
        check this list first to save us both time.

        - File formats other than Markdown
        - Attachments other than images and PDF
        - AI features hosted by us
        - Realtime collaborative editing inside the extension

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The job-to-be-done. The more concrete, the better.
      placeholder: "When I'm reviewing a long mindmap, scrolling back to the root to navigate gets tedious."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see happen?
      description: A specific proposal, or just a rough direction. Either is fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Workarounds you tried, other tools that do this well, or alternative designs.

  - type: dropdown
    id: importance
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would noticeably improve my workflow
        - I keep hitting this — it's blocking me
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, links, example Markdown, anything that helps.
